<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>404 - Not Found</title>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="resources/icons/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="resources/icons/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="resources/icons/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://api.fonts.coollabs.io" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://api.fonts.coollabs.io/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container-fluid text-center">
      <div class="position-absolute top-50 start-50 translate-middle">
        <h1
          style="
            color: #0b8135;
            font-size: 160px;
            font-weight: 800;
            text-shadow: 8px 4px whitesmoke;
          "
        >
          404
        </h1>
        <h2 class="p-3" id="randomText" style="color: #0b8135">
          You're not supposed to be here, dude.
        </h2>
        <a href="index.html">
          <h3
            class="p-3 mt-2"
            style="
              color: black;
              font-family: &quot;Courier New&quot;, Courier, monospace;
              background-color: antiquewhite;
            "
          >
            GO BACK
          </h3>
        </a>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const textOptions = [
          "You're not supposed to be here, dude.",
          "Nothing here man, sorry!",
          "Hmm, who are you again?",
          "I'm watching you.",
          "GET OUT!",
          "I hope you know what you're doing.",
          "That's it, I'm getting my mallet!",
        ];

        const textElement = document.getElementById("randomText");

        if (textElement) {
          const randomIndex = Math.floor(Math.random() * textOptions.length);
          textElement.textContent = textOptions[randomIndex];
        }
      });
    </script>
  </body>
</html>
